project:
  name: multimodal_biometrics
  random_seed: 42
paths:
  data_root: data
  artifact_root: artifacts
  face_root: data/face
  fingerprint_root: data/fingerprint
  palm_root: data/palm
  models_root: artifacts/models
  reports_root: artifacts/reports
  gallery_root: artifacts/gallery
api:
  host: 127.0.0.1
  port: 5000
thresholds:
  face: 0.52
  fingerprint: 0.42
  palm: 0.60
  fusion: 0.50
fusion:
  weights:
    face: 0.34
    fingerprint: 0.33
    palm: 0.33
training:
  face:
    model: hog
    num_jitters: 1
  fingerprint:
    max_keypoints: 500
  palm:
    image_size: 224
    batch_size: 16
    epochs: 8
    lr: 0.0005
