server:
  host: 127.0.0.1
  port: 5000

paths:
  data_root: data
  model_root: saved_models
  gallery_path: saved_models/gallery.pkl
  fusion_model_path: saved_models/fusion_lr.joblib

thresholds:
  face: 0.45
  fingerprint: 0.50
  palm: 0.50
  fused: 0.60

fusion:
  weighted_score:
    face: 0.40
    fingerprint: 0.35
    palm: 0.25

training:
  image_size: 224
  batch_size: 16
  epochs: 10
  lr: 0.0003
  embedding_dim: 256
